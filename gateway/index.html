<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVILA™ | Strategic Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Serif:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: white; }
        .font-brand { font-family: 'Noto Serif', serif; line-height: 1; }
        .tm-style { 
            display: inline-block; font-size: 0.55em; font-family: 'Inter', sans-serif; 
            margin-left: 4px; font-weight: 900; line-height: 1; transform: translateY(0.15em); 
        }
        .tagline-blue { color: #3b82f6; font-weight: 700; text-transform: uppercase; }
        .italic-gray { color: #94a3b8; font-style: italic; font-family: 'Noto Serif', serif; margin: 0 6px; }
        .zero-capex { color: #60a5fa; font-weight: 900; text-transform: uppercase; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="antialiased">

    <header class="p-6 md:p-10 border-b border-white/10 bg-[#020617]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div class="flex items-start gap-4">
                <img src="../logo-invila-white.png" class="h-12 md:h-16 mt-[14px]" alt="Invila Logo">
                <div class="flex flex-col">
                    <h1 class="font-brand text-white text-3xl md:text-5xl flex items-start">INVILA<span class="tm-style">™</span></h1>
                    <div class="flex items-baseline text-[8px] md:text-xs whitespace-nowrap mt-1 md:mt-2">
                        <span class="tagline-blue">Water as a Service</span>
                        <span class="italic-gray">by</span>
                        <span class="zero-capex">Zero CapEx</span>
                    </div>
                </div>
            </div>
            <div class="text-left md:text-right">
                <div id="auth-tag" class="inline-flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded-full text-emerald-400 text-[10px] font-bold uppercase tracking-widest">
                    SECURE ACCESS GRANTED
                </div>
                <h2 class="text-lg md:text-xl font-black text-slate-500 uppercase tracking-tighter italic mt-2">STRATEGIC GATEWAY</h2>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 md:py-20">
        <div class="mb-12">
            <h3 id="welcome-msg" class="text-2xl md:text-4xl font-light text-white/70 leading-snug">
                Selamat Datang, <span id="user-name" class="text-white font-black border-b-4 border-royalBlue">Executive</span>.
            </h3>
            <p id="comp-msg" class="text-lg md:text-xl text-slate-400 mt-4 font-medium italic">Menampilkan analisis optimasi EBITDA untuk <span id="user-comp" class="text-white">Mitra Industri</span>.</p>
        </div>

        <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-12">
            </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="../calculator.html" class="bg-royalBlue hover:bg-blue-500 text-white p-8 rounded-[2rem] flex flex-col items-center justify-center gap-4 transition-all shadow-[0_20px_50px_rgba(37,99,235,0.3)] group active:scale-95">
                <svg class="w-10 h-10 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"></path></svg>
                <span class="font-black uppercase tracking-[0.2em] text-xl">Open Strategic Engine</span>
            </a>

            <button onclick="requestAudit()" class="glass-card text-white p-8 rounded-[2rem] flex flex-col items-center justify-center gap-4 hover:bg-slate-800 transition-all group">
                <svg class="w-10 h-10 text-emerald-400 group-hover:rotate-12 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                <span class="font-bold uppercase tracking-widest text-sm">Request Technical Audit</span>
            </button>
        </div>

        <div class="mt-20 flex flex-col md:flex-row justify-between items-center gap-8 border-t border-white/10 pt-10">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-royalBlue to-mckNavy flex items-center justify-center text-2xl font-black shadow-xl">PS</div>
                <div>
                    <h4 class="font-black text-xl">Piator Simbolon</h4>
                    <p class="text-invilaGold text-[10px] font-bold uppercase tracking-widest leading-none">Senior Lead System Architect</p>
                </div>
            </div>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em]">Invila™ Strategic Advisor Group | 2026</p>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Rekan";
        const role = (params.get('role') || "Executive").toUpperCase();
        const comp = params.get('comp') || "Mitra Industri";

        document.getElementById('user-name').innerText = name;
        document.getElementById('user-comp').innerText = comp;

        const dash = document.getElementById('stats-grid');
        if (role === 'CFO') {
            dash.innerHTML = `
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">Annual Saving</p><p class="text-xl font-black text-emerald-400">Rp 6,64 M</p></div>
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">CapEx Offset</p><p class="text-xl font-black text-royalBlue">Rp 5,79 M</p></div>
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">ROI (WaaS)</p><p class="text-xl font-black text-white">INFINITE</p></div>
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">Model</p><p class="text-xl font-black text-invilaGold underline">OFF-BALANCE</p></div>
            `;
        } else {
            dash.innerHTML = `
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">Outlet Turbidity</p><p class="text-xl font-black text-emerald-400">< 0.15 NTU</p></div>
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">System Uptime</p><p class="text-xl font-black text-royalBlue">99.98%</p></div>
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">Auto-Backwash</p><p class="text-xl font-black text-white">ENABLED</p></div>
                <div class="glass-card p-6 rounded-2xl text-center"><p class="text-[9px] uppercase text-slate-500 mb-2">Monitoring</p><p class="text-xl font-black text-invilaGold">REAL-TIME</p></div>
            `;
        }

        function requestAudit() {
            const msg = `Halo Pak Irfon, kami dari ${comp} (u.p. Pak ${name}) tertarik untuk melakukan Factory Audit terkait solusi Invila™ WaaS. Mohon info jadwal visit.`;
            window.open(`https://wa.me/6285219493322?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
