<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila™ Smart Gateway | Dashboard Strategis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="text-slate-200">
    <div class="min-h-screen flex flex-col items-center px-6 py-12">
        <div class="max-w-4xl w-full space-y-10">
            
            <div class="text-center md:text-left space-y-4">
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-500/10 border border-blue-500/30 rounded-full text-blue-400 text-[10px] font-bold uppercase tracking-widest">
                    <span id="auth-status">Verifying Access...</span>
                </div>
                <h1 id="main-headline" class="text-4xl md:text-6xl font-black text-white leading-tight uppercase tracking-tighter">Take Control of Your <br><span class="text-blue-500">Industrial Water</span></h1>
                <p id="sub-headline" class="text-slate-400 text-lg max-w-2xl">Akses dashboard kedaulatan air & optimasi EBITDA untuk unit industri Anda.</p>
            </div>

            <div id="dynamic-dashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-4">
                <a href="../calculator.html" class="bg-blue-600 hover:bg-blue-500 text-white p-6 rounded-2xl font-black text-center transition-all shadow-[0_10px_40px_-10px_rgba(37,99,235,0.5)] uppercase tracking-widest text-xl flex items-center justify-center gap-3 active:scale-95">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Open Strategic Engine
                </a>
                
                <button onclick="requestAudit()" class="glass-card text-white p-6 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-800 transition-all uppercase tracking-widest text-sm">
                    <svg class="w-6 h-6 text-emerald-400" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Request Technical Audit
                </button>
            </div>

            <div class="text-center">
                <button onclick="handleForward()" class="text-blue-400 font-black uppercase tracking-[0.3em] text-[10px] hover:text-white transition-colors border-b border-blue-400/30 pb-1">
                    » Forward Strategi EBITDA ke CFO
                </button>
            </div>

            <div class="glass-card p-8 rounded-3xl flex flex-col md:flex-row gap-8 items-center mt-10">
                <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-800 flex items-center justify-center text-4xl font-black text-white shadow-xl rotate-3">PS</div>
                <div>
                    <h3 class="text-2xl font-bold text-white">Piator Simbolon</h3>
                    <p class="text-blue-400 font-bold text-xs uppercase tracking-widest">Senior Lead System Architect</p>
                    <p class="text-slate-400 italic text-sm mt-3 border-l-2 border-blue-500/50 pl-4">"Kami mengamankan stabilitas produksi dan efisiensi EBITDA Anda secara autopilot."</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Rekan";
        const role = (params.get('role') || "Executive").toUpperCase();
        const comp = params.get('comp') || "Mitra Industri";

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('auth-status').innerText = `AUTHENTICATED: PAK ${name} (${role})`;
            const dash = document.getElementById('dynamic-dashboard');

            if (role === 'CFO') {
                document.getElementById('main-headline').innerHTML = `EBITDA Protection & <br><span class="text-blue-500">Capital Efficiency</span> at ${comp}`;
                dash.innerHTML = `
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">CapEx Offset</p><p class="text-xl font-black text-emerald-400">Rp 5,79 M</p></div>
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">Annual Saving</p><p class="text-xl font-black text-blue-400">Rp 6,64 M</p></div>
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">ROI</p><p class="text-xl font-black text-blue-400 uppercase">Infinite</p></div>
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">Daily Vol</p><p class="text-xl font-black text-white uppercase">2.000 m³</p></div>
                `;
            } else {
                dash.innerHTML = `
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">Outlet Turbidity</p><p class="text-xl font-black text-emerald-400">< 0.18 NTU</p></div>
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">System Uptime</p><p class="text-xl font-black text-blue-400">99.98%</p></div>
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">Diff. Pressure</p><p class="text-xl font-black text-blue-400">0.85 bar</p></div>
                    <div class="glass-card p-4 rounded-xl text-center"><p class="text-[9px] uppercase text-slate-500">Daily Feed</p><p class="text-xl font-black text-white uppercase">2.000 m³</p></div>
                `;
            }
        });

        function handleForward() {
            const baseUrl = "https://zerocapexwaterinfrastructure.com/gateway/";
            const targetRole = (role === 'CFO') ? 'FM' : 'CFO';
            const link = `${baseUrl}?name=${targetRole}&role=${targetRole}&comp=${encodeURIComponent(comp)}`;
            
            let msg = "";
            if (role === 'CFO') {
                msg = `Pak Beni, saya baru meninjau potensi saving Rp6,64 Miliar dari Invila™ (Zero CapEx). Mohon validasi teknisnya di sini: ${link}`;
            } else {
                msg = `Pak, saya mereview utilitas air kita. Terdeteksi risiko biaya 'hanyut' Rp6,64 Miliar/tahun akibat tarif PDAM Rp14.600/m³. Invila menawarkan solusi Zero CapEx Rp5.500/m³. Mohon tinjau SIMULASI EBITDA khusus ${comp} di sini: ${link}`;
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        function requestAudit() {
            const msg = `Halo Pak Irfon, kami tertarik untuk melakukan Factory Audit terkait solusi Invila™ WaaS untuk ${comp}. Mohon info jadwal ketersediaan tim.`;
            window.open(`https://wa.me/6285219493322?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
