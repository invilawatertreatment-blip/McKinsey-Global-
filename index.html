<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila™ | Sovereign Industrial Water Infrastructure</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: '#05070a',
                        royalBlue: '#2563eb',
                        roseAccent: '#e11d48',
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Angka stabil & tabular agar tidak goyang saat berputar */
        #odometer { 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -0.02em;
        }

        .fade-in { opacity: 0; transition: opacity 1s ease-in-out; }
        .fade-in.visible { opacity: 1; }
        .hidden-element { display: none; }

        .bg-fixed-air {
            background-image: url('air.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] backdrop-blur-md border-b border-black/5">
        <div class="max-w-7xl mx-auto px-8 h-24 flex items-center justify-between">
            <img src="logo-invila-white.png" alt="Invila" class="h-8 brightness-0"> 
            <div class="hidden md:flex space-x-10 text-[10px] font-bold tracking-[0.3em] uppercase text-black opacity-60">
                <a href="#audit" class="hover:text-royalBlue transition-all">Risk Audit</a>
                <a href="#case-study" class="hover:text-royalBlue transition-all">Case Study</a>
            </div>
            <a href="https://wa.me/622188866168" class="bg-royalBlue text-white px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest">
                Site Audit
            </a>
        </div>
    </nav>

    <section class="relative h-screen w-full flex items-center justify-center overflow-hidden bg-white">
        <video id="heroVideo" autoplay muted playsinline class="absolute z-50 w-full h-full object-cover">
            <source src="landingpage_front_optimized.mp4" type="video/mp4">
        </video>

        <div id="heroImage" class="absolute inset-0 z-10 hidden bg-fixed-air"></div>

        <div id="contentOverlay" class="relative z-40 text-center px-6 hidden opacity-0 transition-opacity duration-1000">
            <h2 class="text-black font-bold tracking-[0.5em] uppercase text-[10px] mb-6 opacity-70">
                Verified Industrial Performance.
            </h2>
            
            <div class="mb-8">
                <span id="odometer" class="text-7xl md:text-[11rem] font-black text-royalBlue leading-none">79.150.000</span>
                <span class="text-3xl md:text-5xl font-light text-royalBlue ml-2 italic font-serif">m³</span>
            </div>

            <div class="max-w-3xl mx-auto">
                <p class="text-lg md:text-2xl font-light leading-relaxed text-black">
                    Bukan sekadar volume, ini adalah <strong class="font-black underline decoration-royalBlue">akumulasi risiko yang berhasil kami mitigasi</strong> selama dua dekade.
                </p>
                <div class="mt-12">
                    <a href="https://invilawatertreatment-blip.github.io/akumulasi-kapasitas-terpasang-dan-Logo-klien/" target="_blank" class="text-[10px] font-black uppercase tracking-[0.3em] border-b-2 border-black pb-2 text-black hover:text-royalBlue hover:border-royalBlue transition-all">
                        View Audited Capacity Portfolio →
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const heroVideo = document.getElementById('heroVideo');
        const heroImage = document.getElementById('heroImage');
        const contentOverlay = document.getElementById('contentOverlay');
        const odometer = document.getElementById('odometer');

        function animateValue(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * (end - start) + start);
                odometer.innerHTML = value.toLocaleString('id-ID');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        heroVideo.onended = function() {
            heroVideo.style.transition = "opacity 1s ease";
            heroVideo.style.opacity = "0";
            
            setTimeout(() => {
                heroVideo.classList.add('hidden-element');
                heroImage.classList.remove('hidden');
                heroImage.classList.add('fade-in');
                setTimeout(() => heroImage.classList.add('visible'), 50);

                contentOverlay.classList.remove('hidden');
                setTimeout(() => {
                    contentOverlay.style.opacity = "1";
                    // REVISI: Mulai dari 79.150.000 ke 79.154.776 (Hanya gerak sedikit agar elegan)
                    animateValue(79150000, 79154776, 2000);
                }, 500);
            }, 1000);
        };
    </script>
</body>
</html>
