<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invila™ | Sovereign Industrial Water Infrastructure</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: '#05070a',
                        royalBlue: '#2563eb',
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        /* Menggunakan Dynamic Viewport Height agar pas di layar HP (menghindari URL bar) */
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100dvh; }
        
        #odometer { 
            font-variant-numeric: tabular-nums; 
            letter-spacing: -0.02em;
        }

        .fade-in { opacity: 0; transition: opacity 1s ease-in-out; }
        .fade-in.visible { opacity: 1; }
        .hidden-element { display: none !important; }

        /* Optimasi Background HP */
        .bg-fixed-air {
            background-image: url('air.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: scroll; /* Android/iOS sering bermasalah dengan 'fixed', scroll lebih aman */
        }
        @media (min-width: 768px) {
            .bg-fixed-air { background-attachment: fixed; }
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-[100] backdrop-blur-md border-b border-black/5 bg-white/70">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-16 md:h-24 flex items-center justify-between">
            <img src="logo-invila-white.png" alt="Invila" class="h-6 md:h-8 brightness-0"> 
            <a href="https://wa.me/622188866168" class="bg-royalBlue text-white px-5 md:px-8 py-2 md:py-3 rounded-full text-[9px] md:text-[10px] font-black uppercase tracking-widest shadow-md">
                Site Audit
            </a>
        </div>
    </nav>

    <section class="relative h-[100dvh] w-full flex items-center justify-center overflow-hidden bg-white">
        
        <video id="heroVideo" autoplay muted playsinline class="absolute z-50 w-full h-full object-cover">
            <source src="landingpage_front_optimized.mp4" type="video/mp4">
        </video>

        <div id="heroImage" class="absolute inset-0 z-10 hidden bg-fixed-air">
            <div class="absolute inset-0 bg-white/20"></div>
        </div>

        <div id="contentOverlay" class="relative z-40 text-center px-4 md:px-6 hidden opacity-0 transition-opacity duration-1000">
            <h2 class="text-black font-bold tracking-[0.3em] md:tracking-[0.5em] uppercase text-[8px] md:text-[10px] mb-4 md:mb-6 opacity-70">
                Verified Industrial Performance.
            </h2>
            
            <div class="mb-6 md:mb-8">
                <span id="odometer" class="text-4xl sm:text-6xl md:text-[11rem] font-black text-royalBlue leading-none">79.150.000</span>
                <span class="text-xl md:text-5xl font-light text-royalBlue ml-1 md:ml-2 italic font-serif">m³</span>
            </div>

            <div class="max-w-xs sm:max-w-xl md:max-w-3xl mx-auto">
                <p class="text-sm md:text-2xl font-light leading-relaxed text-black">
                    Bukan sekadar volume, ini adalah <strong class="font-black underline decoration-royalBlue">akumulasi risiko yang berhasil kami mitigasi</strong> selama dua dekade.
                </p>
                
                <div class="mt-8 md:mt-12">
                    <a href="https://invilawatertreatment-blip.github.io/akumulasi-kapasitas-terpasang-dan-Logo-klien/" target="_blank" class="inline-block bg-royalBlue text-white px-8 md:px-10 py-4 rounded-full text-[10px] font-black uppercase tracking-[0.2em] shadow-lg shadow-royalBlue/40 active:scale-95 transition-all">
                        Lihat Portofolio
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const heroVideo = document.getElementById('heroVideo');
        const heroImage = document.getElementById('heroImage');
        const contentOverlay = document.getElementById('contentOverlay');
        const odometer = document.getElementById('odometer');

        function animateValue(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * (end - start) + start);
                odometer.innerHTML = value.toLocaleString('id-ID');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Fungsi Transisi (Dipakai di ended atau failsafe)
        function triggerTransition() {
            if (!contentOverlay.classList.contains('hidden')) return; // Mencegah double run

            heroVideo.style.transition = "opacity 0.8s ease";
            heroVideo.style.opacity = "0";
            
            setTimeout(() => {
                heroVideo.classList.add('hidden-element');
                heroImage.classList.remove('hidden');
                heroImage.classList.add('fade-in');
                setTimeout(() => heroImage.classList.add('visible'), 50);

                contentOverlay.classList.remove('hidden');
                setTimeout(() => {
                    contentOverlay.style.opacity = "1";
                    animateValue(79150000, 79154776, 2000);
                }, 300);
            }, 800);
        }

        // Jalankan saat video selesai
        heroVideo.onended = triggerTransition;

        // FAILSAFE: Jika video tidak jalan atau internet HP lambat,
        // paksa munculkan konten setelah 4 detik agar HP tidak blank putih.
        setTimeout(() => {
            triggerTransition();
        }, 4000);

    </script>
</body>
</html>
