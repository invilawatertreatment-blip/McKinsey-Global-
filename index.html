<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila™ | Sovereign Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { ink: '#0f172a', royalBlue: '#2563eb' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #0f172a; overflow-x: hidden; }
        
        /* Container Utama dengan Background Foto Air (Standby) */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('air.jpg'); /* Foto Air siap di belakang */
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* Video Layer */
        #hero-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 20;
            transition: opacity 1.5s ease-out;
        }

        /* Overlay Gelap agar Odometer terbaca namun tetap transparan */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.4));
            z-index: 25;
        }

        /* Odometer Transparan (Glassmorphism Effect) */
        .odometer-text {
            font-size: clamp(5rem, 15vw, 12rem);
            line-height: 0.8;
            /* Efek Transparan agar Air Menembus Angka */
            color: rgba(255, 255, 255, 0.15); 
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(2px);
            mix-blend-mode: overlay;
        }

        .fade-out { opacity: 0; pointer-events: none; }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal { animation: fadeUp 1.2s ease forwards; opacity: 0; }
    </style>
</head>
<body class="font-sans antialiased">

    <section class="hero-container">
        <video id="hero-video" autoplay muted playsinline>
            <source src="landingpage_front_optimized.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>

        <div class="relative z-30 h-full flex flex-col justify-center items-center px-6 text-center">
            <div id="content-trigger" class="animate-reveal">
                <span class="text-royalBlue font-bold tracking-[0.4em] text-xs uppercase mb-8 block">
                    Verified Industrial Performance
                </span>
                
                <div class="flex items-baseline justify-center">
                    <h1 id="odometer" class="odometer-text font-black tracking-tighter">
                        0
                    </h1>
                    <span class="text-3xl md:text-5xl font-serif italic text-white ml-4 opacity-80">m³</span>
                </div>

                <h2 class="text-2xl md:text-4xl font-light text-slate-200 mt-12 max-w-4xl mx-auto leading-tight italic font-serif">
                    "Managed by Invila™ Utility Infrastructure."
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mt-20 max-w-6xl mx-auto border-t border-white/10 pt-12">
                    <div class="text-center">
                        <p class="text-royalBlue font-black text-[10px] tracking-[0.3em] uppercase mb-2">Stability</p>
                        <p class="text-lg font-bold text-white/90">99.98% Uptime</p>
                    </div>
                    <div class="text-center">
                        <p class="text-royalBlue font-black text-[10px] tracking-[0.3em] uppercase mb-2">Finance</p>
                        <p class="text-lg font-bold text-white/90">Zero Capex Model</p>
                    </div>
                    <div class="text-center">
                        <p class="text-royalBlue font-black text-[10px] tracking-[0.3em] uppercase mb-2">Compliance</p>
                        <p class="text-lg font-bold text-white/90">100% Risk Transfer</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const video = document.getElementById('hero-video');
        const odometerElement = document.getElementById('odometer');
        const contentTrigger = document.getElementById('content-trigger');

        // Target Angka Odometer
        const targetValue = 79154776;

        function animateOdometer(target, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentValue = Math.floor(progress * target);
                odometerElement.innerHTML = currentValue.toLocaleString('id-ID');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    // Setelah selesai, biarkan berdetak pelan +1 setiap 2 detik
                    setInterval(() => {
                        const nextVal = parseInt(odometerElement.innerText.replace(/\./g, '')) + 1;
                        odometerElement.innerHTML = nextVal.toLocaleString('id-ID');
                    }, 2000);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Event saat video selesai
        video.onended = function() {
            // 1. Video fade out
            video.classList.add('fade-out');
            
            // 2. Munculkan Konten & Mulai Odometer
            contentTrigger.style.opacity = "1";
            animateOdometer(targetValue, 3000); // 3 detik durasi animasi
        };

        // Fallback: Jika video gagal load atau butuh waktu lama, 
        // tetap jalankan konten setelah 5 detik
        setTimeout(() => {
            if (odometerElement.innerText === "0") {
                video.classList.add('fade-out');
                contentTrigger.style.opacity = "1";
                animateOdometer(targetValue, 3000);
            }
        }, 8000);
    </script>

</body>
</html>
